<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }}</title>
  <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>

  <!-- Header / Navigation -->
<header class="container">
  <div class="mobile-header">
    <div class="hamburger" id="hamburger" onclick="toggleMenu()">
      <span></span>
      <span></span>
      <span></span>
    </div>
    <div class="logo">DYWO</div>
  </div>

  <nav class="nav" id="nav-menu">
    <a href="/index.html">HOME</a>
    <a href="/about-us.html">ABOUT US</a>
    <a href="/meet-us.html">MEET US</a>
    <a href="/join-us.html">JOIN US</a>
    <a href="/events.html">EVENTS</a>
    <a href="/contact.html">CONTACT</a>
  </nav>
</header>

<script>
function toggleMenu() {
  const menu = document.getElementById('nav-menu');
  const hamburger = document.getElementById('hamburger');

  menu.classList.toggle('show');
  hamburger.classList.toggle('open');
  document.body.classList.toggle('nav-open');
}
</script>

  {{ content }}

  <footer>
    <p>&copy; 2026 Devon Youth Wind Orchestra | <a href="https://github.com/owen-kellie-smith/dywo-website">Edit v0.0.1</a></p>
  </footer>

<script>
  // Select all menu links
  const navLinks = document.querySelectorAll('.nav a');

  // Get current page path (e.g., "/about-us.html")
  const currentPage = window.location.pathname.split('/').pop();

  navLinks.forEach(link => {
    // Get the href of the link (just the filename)
    const linkPage = link.getAttribute('href').split('/').pop();

    if (linkPage === currentPage) {
      link.classList.add('active');
    }
  });
</script>
</body>
</html>
